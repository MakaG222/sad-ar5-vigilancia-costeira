name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    name: API — smoke + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: plataforma/api/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r plataforma/api/requirements.txt

      - name: Lint Python (ruff)
        run: ruff check plataforma/api/services plataforma/api/main.py scripts

      - name: Integridade JSON
        run: python scripts/verificar_integridade.py

      - name: Smoke test
        working-directory: plataforma/api
        run: python smoke_test.py

      - name: Testes unitários + cobertura
        run: pytest plataforma/api/tests/ -q --cov=plataforma/api/services --cov=src --cov-report=term-missing:skip-covered --cov-fail-under=50

  web:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plataforma/web/package-lock.json

      - name: Instalar e compilar
        working-directory: plataforma/web
        run: |
          npm ci
          npm run build

  docker:
    name: Docker — build imagem
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: plataforma/Dockerfile
          push: false
          tags: sad-ar5:ci

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plataforma/web/package-lock.json

      - name: Dependências
        run: |
          pip install -r plataforma/api/requirements.txt
          cd plataforma/web && npm ci

      - name: Build frontend
        working-directory: plataforma/web
        run: npm run build

      - name: Playwright
        working-directory: plataforma/web
        env:
          DEMO_DETERMINISTICO: "1"
          CI: "true"
        run: |
          cd ../api && uvicorn main:app --host 127.0.0.1 --port 8080 &
          for i in $(seq 1 120); do
            curl -sf http://127.0.0.1:8080/api/health && break
            sleep 1
          done
          cd ../web
          npx playwright install --with-deps chromium
          npm run test:e2e
